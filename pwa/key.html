<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body>
    <main
      x-data="{
        client_id: 'fitbit/client_id',
        client_id_value: localStorage.getItem('fitbit/client_id') || '',
        client_secret: 'fitbit/client_secret',
        client_secret_value: localStorage.getItem('fitbit/client_secret') || '',
        access_token: 'fitbit/access_token',
        access_token_value: localStorage.getItem('fitbit/access_token') || '',
        refresh_token: 'fitbit/refresh_token',
        refresh_token_value: localStorage.getItem('fitbit/refresh_token') || '',
        updateValue() {
          if(this.client_id_value && this.client_secret_value && this.access_token_value && this.refresh_token_value) {
            localStorage.setItem(this.client_id, this.client_id_value);
            localStorage.setItem(this.client_secret, this.client_secret_value);
            localStorage.setItem(this.access_token, this.access_token_value);
            localStorage.setItem(this.refresh_token, this.refresh_token_value);
            setTimeout(() => {
              alert('保存しました');
            }, 100);
          } else {
            alert('保存できませんでした\n\n全ての値を入力してください');
          }
        },
        clear() {
          localStorage.removeItem(this.client_id);
          localStorage.removeItem(this.client_secret);
          localStorage.removeItem(this.access_token);
          localStorage.removeItem(this.refresh_token);
          this.client_id_value = '';
          this.client_secret_value = '';
          this.access_token_value = '';
          this.refresh_token_value = '';
          setTimeout(() => {
            alert('削除しました');
          }, 100);
        }
      }">
      <div class="content">
        <h1>funget - API設定</h1>
        <div class="wrapper">
          <p x-text="client_id"></p>
          <input type="text" x-model="client_id_value" placeholder="入力してください" />
        </div>
        <div class="wrapper">
          <p x-text="client_secret"></p>
          <input type="text" x-model="client_secret_value" placeholder="入力してください" />
        </div>
        <div class="wrapper">
          <p x-text="access_token"></p>
          <input type="text" x-model="access_token_value" placeholder="入力してください" />
        </div>
        <div class="wrapper">
          <p x-text="refresh_token"></p>
          <input type="text" x-model="refresh_token_value" placeholder="入力してください" />
        </div>
      </div>
      <div class="button-box">
        <button x-on:click="updateValue">更新</button>
        <button x-on:click="clear">削除</button>
      </div>
      <br />
      <h2>説明リンク</h2>
      <p>分かる人だけ操作してください</p>
      <a href="https://dev.fitbit.com/build/reference/web-api/developer-guide/getting-started/">getting-started | fitbit developer</a>
    </main>
    <style>
      .wrapper {
        display: flex;
        margin: 10px 0;
        height: 30px;
      }
      .wrapper p {
        width: 160px;
        line-height: 0;
      }
      .wrapper input {
        width: 200px;
      }
      .button-box {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
      }
      button {
        width: calc(50% - 5px);
        height: 40px;
        font-size: 20px;
      }
    </style>
  </body>
</html>
